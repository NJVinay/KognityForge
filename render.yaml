services:
  - type: web
    name: kognityforge-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_API_KEY
        generateValue: true
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT_NAME
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-15-preview
      - key: FRONTEND_URL
        value: https://kognityforge.streamlit.app
